name: Daily Sales Prospecting Agent

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prospect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run Sales Prospecting Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/sales_agent.py
      
      - name: Auto commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily sales prospecting results"
          file_pattern: "prospects_*.json"
