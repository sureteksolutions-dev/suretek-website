hname: Daily Sales Prospecting Agent

on:
  schedule:
    # Runs every day at 9:00 AM UTC (adjust time as needed)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allows manual trigger

jobs:
  prospect:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run Sales Prospecting Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/sales_agent.py
      
      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Sales Agent Bot"
          git add -A
          git commit -m "Daily sales prospecting results - $(date)" || echo "No changes to commit"
          git push
